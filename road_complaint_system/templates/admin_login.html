{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow">
                <div class="card-header bg-dark text-white py-3 text-center">
                    <h4 class="mb-0"><i class="fas fa-user-shield me-2"></i>Admin Login</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 btn-lg"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
                    </form>
                    <hr>
                    <div class="text-muted small">
                        <p class="mb-1"><strong>Demo Credentials:</strong></p>
                        <p class="mb-1">Admin: admin / admin123</p>
                        <p class="mb-1">MLA: mla / mla123</p>
                        <p class="mb-0">Engineer: engineer / eng123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
